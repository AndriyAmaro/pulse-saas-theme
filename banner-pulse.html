<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse Design System Banner</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  }

  .banner {
    width: 1280px;
    height: 640px;
    background: #0a0a1a;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Gradient orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
  }

  .orb-1 {
    width: 500px;
    height: 500px;
    background: #6366f1;
    top: -200px;
    right: -100px;
    opacity: 0.25;
  }

  .orb-2 {
    width: 400px;
    height: 400px;
    background: #06b6d4;
    bottom: -150px;
    left: -100px;
    opacity: 0.2;
  }

  .orb-3 {
    width: 300px;
    height: 300px;
    background: #14b8a6;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.1;
  }

  /* Grid pattern */
  .grid-pattern {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(99, 102, 241, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Content */
  .content {
    position: relative;
    z-index: 10;
    text-align: center;
    color: #fff;
  }

  .badge-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 24px;
  }

  .badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 5px 14px;
    border-radius: 100px;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(99, 102, 241, 0.2);
    background: rgba(0, 0, 0, 0.3);
    color: rgba(199, 210, 254, 0.7);
  }

  .pulse-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    border-radius: 100px;
    border: 1px solid rgba(20, 184, 166, 0.4);
    background: rgba(20, 184, 166, 0.1);
    backdrop-filter: blur(12px);
    margin-bottom: 20px;
  }

  .pulse-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #14b8a6;
    box-shadow: 0 0 12px rgba(20, 184, 166, 0.6);
  }

  .pulse-text {
    font-size: 13px;
    font-weight: 600;
    color: #5eead4;
    letter-spacing: 2px;
  }

  .name {
    font-family: 'Orbitron', sans-serif;
    font-size: 58px;
    font-weight: 900;
    letter-spacing: 2px;
    margin-bottom: 4px;
    line-height: 1.1;
    background: linear-gradient(135deg, #818cf8 0%, #6366f1 20%, #a5b4fc 40%, #14b8a6 60%, #06b6d4 80%, #818cf8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 20px rgba(99, 102, 241, 0.3));
  }

  .subtitle {
    font-size: 18px;
    font-weight: 500;
    color: #94a3b8;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .stats-row {
    display: flex;
    gap: 40px;
    justify-content: center;
    padding: 18px 36px;
    border-radius: 16px;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(99, 102, 241, 0.15);
    margin-bottom: 28px;
  }

  .stat {
    text-align: center;
    padding: 0 12px;
  }

  .stat + .stat {
    border-left: 1px solid rgba(255, 255, 255, 0.08);
    padding-left: 52px;
  }

  .stat-value {
    font-size: 30px;
    font-weight: 800;
    background: linear-gradient(135deg, #818cf8, #14b8a6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .stat-label {
    font-size: 11px;
    font-weight: 500;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 2px;
  }

  .footer-text {
    font-size: 13px;
    color: #64748b;
    letter-spacing: 1px;
  }

  .footer-text span {
    color: #14b8a6;
    font-weight: 600;
  }

  /* Corner decorations */
  .corner-tl, .corner-br {
    position: absolute;
    width: 60px;
    height: 60px;
    z-index: 10;
  }

  .corner-tl {
    top: 20px;
    left: 20px;
    border-top: 2px solid rgba(20, 184, 166, 0.3);
    border-left: 2px solid rgba(20, 184, 166, 0.3);
  }

  .corner-br {
    bottom: 20px;
    right: 20px;
    border-bottom: 2px solid rgba(99, 102, 241, 0.3);
    border-right: 2px solid rgba(99, 102, 241, 0.3);
  }
</style>
</head>
<body>

<div class="banner">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grid-pattern"></div>

  <div class="corner-tl"></div>
  <div class="corner-br"></div>

  <div class="badge-row">
    <span class="badge">Next.js 16</span>
    <span class="badge">React 19</span>
    <span class="badge">TypeScript 5</span>
    <span class="badge">Tailwind 4</span>
    <span class="badge">Radix UI</span>
    <span class="badge">Atomic Design</span>
  </div>

  <div class="content">
    <div class="pulse-label">
      <div class="pulse-dot"></div>
      <span class="pulse-text">DESIGN SYSTEM</span>
    </div>

    <div class="name">Pulse</div>
    <div class="subtitle">The Foundation of the Ecosystem</div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-value">104+</div>
        <div class="stat-label">Components</div>
      </div>
      <div class="stat">
        <div class="stat-value">41</div>
        <div class="stat-label">Pages</div>
      </div>
      <div class="stat">
        <div class="stat-value">28</div>
        <div class="stat-label">Dashboards</div>
      </div>
      <div class="stat">
        <div class="stat-value">3</div>
        <div class="stat-label">Languages</div>
      </div>
    </div>

    <div class="footer-text">Built from scratch by <span>Andri Amaro</span> · Source Available License</div>
  </div>
</div>

</body>
</html>
