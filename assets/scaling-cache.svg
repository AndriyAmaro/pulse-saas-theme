<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" width="520">
  <rect width="520" height="260" rx="16" fill="#0D1117"/>
  <text x="260" y="28" text-anchor="middle" fill="#5EEAD4" font-family="system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="2">CACHE HIERARCHY</text>

  <!-- L1 -->
  <rect x="30" y="46" width="460" height="56" rx="10" fill="#161B22" stroke="#14B8A6" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="54" y="68" fill="#5EEAD4" font-family="system-ui,sans-serif" font-size="11" font-weight="700">L1</text>
  <text x="82" y="68" fill="#E6EDF3" font-family="system-ui,sans-serif" font-size="12" font-weight="600">React Cache</text>
  <text x="82" y="86" fill="#8B949E" font-family="system-ui,sans-serif" font-size="9">Per-request, in-memory · Deduplicates DB calls in one SSR render</text>
  <text x="440" y="78" text-anchor="end" fill="#5EEAD4" font-family="system-ui,sans-serif" font-size="9" font-weight="600">TTL: request</text>

  <!-- L2 -->
  <rect x="30" y="112" width="460" height="56" rx="10" fill="#161B22" stroke="#EF4444" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="54" y="134" fill="#F87171" font-family="system-ui,sans-serif" font-size="11" font-weight="700">L2</text>
  <text x="82" y="134" fill="#E6EDF3" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Redis (Upstash)</text>
  <text x="82" y="152" fill="#8B949E" font-family="system-ui,sans-serif" font-size="9">Shared, persistent · Cross-request query caching</text>
  <text x="440" y="144" text-anchor="end" fill="#F87171" font-family="system-ui,sans-serif" font-size="9" font-weight="600">TTL: 60-3600s</text>

  <!-- L3 -->
  <rect x="30" y="178" width="460" height="56" rx="10" fill="#161B22" stroke="#3B82F6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="54" y="200" fill="#60A5FA" font-family="system-ui,sans-serif" font-size="11" font-weight="700">L3</text>
  <text x="82" y="200" fill="#E6EDF3" font-family="system-ui,sans-serif" font-size="12" font-weight="600">CDN Edge</text>
  <text x="82" y="218" fill="#8B949E" font-family="system-ui,sans-serif" font-size="9">Static assets, marketing pages · Revalidate on demand</text>
  <text x="440" y="210" text-anchor="end" fill="#60A5FA" font-family="system-ui,sans-serif" font-size="9" font-weight="600">TTL: 3600s+</text>

  <text x="260" y="250" text-anchor="middle" fill="#64748B" font-family="system-ui,sans-serif" font-size="9">Fastest → Slowest · Smallest → Largest</text>
</svg>