<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 300" width="540">
  <rect width="540" height="300" rx="16" fill="#0D1117"/>
  <text x="270" y="28" text-anchor="middle" fill="#5EEAD4" font-family="system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="2">OBSERVABILITY STACK</text>

  <!-- Tools grid -->
  <rect x="20" y="46" width="245" height="150" rx="10" fill="#161B22" stroke="#14B8A6" stroke-opacity="0.2" stroke-width="1"/>
  <text x="142" y="66" text-anchor="middle" fill="#5EEAD4" font-family="system-ui,sans-serif" font-size="10" font-weight="700" letter-spacing="1">TOOLS</text>

  <text x="36" y="90" fill="#E6EDF3" font-family="system-ui,sans-serif" font-size="10" font-weight="600">Metrics</text>
  <text x="130" y="90" fill="#8B949E" font-family="system-ui,sans-serif" font-size="10">Vercel Analytics</text>

  <text x="36" y="110" fill="#E6EDF3" font-family="system-ui,sans-serif" font-size="10" font-weight="600">Logging</text>
  <text x="130" y="110" fill="#8B949E" font-family="system-ui,sans-serif" font-size="10">Vercel Logs / Axiom</text>

  <text x="36" y="130" fill="#E6EDF3" font-family="system-ui,sans-serif" font-size="10" font-weight="600">Tracing</text>
  <text x="130" y="130" fill="#8B949E" font-family="system-ui,sans-serif" font-size="10">OpenTelemetry</text>

  <text x="36" y="150" fill="#E6EDF3" font-family="system-ui,sans-serif" font-size="10" font-weight="600">Errors</text>
  <text x="130" y="150" fill="#8B949E" font-family="system-ui,sans-serif" font-size="10">Sentry</text>

  <text x="36" y="170" fill="#E6EDF3" font-family="system-ui,sans-serif" font-size="10" font-weight="600">Uptime</text>
  <text x="130" y="170" fill="#8B949E" font-family="system-ui,sans-serif" font-size="10">Better Uptime</text>

  <text x="36" y="190" fill="#E6EDF3" font-family="system-ui,sans-serif" font-size="10" font-weight="600">APM</text>
  <text x="130" y="190" fill="#8B949E" font-family="system-ui,sans-serif" font-size="10">Vercel Speed Insights</text>

  <!-- Key metrics -->
  <rect x="275" y="46" width="245" height="150" rx="10" fill="#161B22" stroke="#14B8A6" stroke-opacity="0.2" stroke-width="1"/>
  <text x="397" y="66" text-anchor="middle" fill="#5EEAD4" font-family="system-ui,sans-serif" font-size="10" font-weight="700" letter-spacing="1">KEY METRICS</text>

  <!-- Metric bars -->
  <text x="290" y="90" fill="#E6EDF3" font-family="system-ui,sans-serif" font-size="10">p95 response time</text>
  <text x="506" y="90" text-anchor="end" fill="#4ADE80" font-family="system-ui,sans-serif" font-size="10" font-weight="700">&lt; 200ms</text>

  <text x="290" y="115" fill="#E6EDF3" font-family="system-ui,sans-serif" font-size="10">Error rate</text>
  <text x="506" y="115" text-anchor="end" fill="#4ADE80" font-family="system-ui,sans-serif" font-size="10" font-weight="700">&lt; 0.1%</text>

  <text x="290" y="140" fill="#E6EDF3" font-family="system-ui,sans-serif" font-size="10">Core Web Vitals LCP</text>
  <text x="506" y="140" text-anchor="end" fill="#4ADE80" font-family="system-ui,sans-serif" font-size="10" font-weight="700">&lt; 2.5s</text>

  <text x="290" y="165" fill="#E6EDF3" font-family="system-ui,sans-serif" font-size="10">Cache hit ratio</text>
  <text x="506" y="165" text-anchor="end" fill="#4ADE80" font-family="system-ui,sans-serif" font-size="10" font-weight="700">&gt; 85%</text>

  <text x="290" y="190" fill="#E6EDF3" font-family="system-ui,sans-serif" font-size="10">Queue processing p95</text>
  <text x="506" y="190" text-anchor="end" fill="#4ADE80" font-family="system-ui,sans-serif" font-size="10" font-weight="700">&lt; 30s</text>

  <!-- DB Scaling Path -->
  <rect x="20" y="210" width="500" height="70" rx="10" fill="#161B22" stroke="#8B5CF6" stroke-opacity="0.2" stroke-width="1"/>
  <text x="270" y="230" text-anchor="middle" fill="#A78BFA" font-family="system-ui,sans-serif" font-size="10" font-weight="700" letter-spacing="1">DATABASE SCALING PATH</text>

  <text x="50" y="252" fill="#8B949E" font-family="system-ui,sans-serif" font-size="9">Single PG</text>
  <text x="50" y="265" fill="#5EEAD4" font-family="system-ui,sans-serif" font-size="8" font-weight="600">~100 q/s</text>

  <text x="132" y="258" fill="#64748B" font-family="system-ui,sans-serif" font-size="12">→</text>

  <text x="155" y="252" fill="#8B949E" font-family="system-ui,sans-serif" font-size="9">+ PgBouncer</text>
  <text x="155" y="265" fill="#5EEAD4" font-family="system-ui,sans-serif" font-size="8" font-weight="600">~1K q/s</text>

  <text x="242" y="258" fill="#64748B" font-family="system-ui,sans-serif" font-size="12">→</text>

  <text x="265" y="252" fill="#8B949E" font-family="system-ui,sans-serif" font-size="9">+ Replicas + CH</text>
  <text x="265" y="265" fill="#5EEAD4" font-family="system-ui,sans-serif" font-size="8" font-weight="600">~10K q/s</text>

  <text x="365" y="258" fill="#64748B" font-family="system-ui,sans-serif" font-size="12">→</text>

  <text x="388" y="252" fill="#8B949E" font-family="system-ui,sans-serif" font-size="9">Citus/Sharding + S3</text>
  <text x="388" y="265" fill="#5EEAD4" font-family="system-ui,sans-serif" font-size="8" font-weight="600">~100K+ q/s</text>
</svg>