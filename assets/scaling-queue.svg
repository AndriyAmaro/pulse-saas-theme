<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" width="520">
  <rect width="520" height="280" rx="16" fill="#0D1117"/>
  <text x="260" y="28" text-anchor="middle" fill="#5EEAD4" font-family="system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="2">QUEUE ARCHITECTURE</text>

  <!-- Priority Queues -->
  <rect x="30" y="46" width="250" height="170" rx="10" fill="#161B22" stroke="#F59E0B" stroke-opacity="0.3" stroke-width="1"/>
  <text x="155" y="66" text-anchor="middle" fill="#FBBF24" font-family="system-ui,sans-serif" font-size="10" font-weight="700" letter-spacing="1">PRIORITY QUEUES</text>

  <!-- P0 -->
  <rect x="44" y="78" width="222" height="26" rx="5" fill="#EF4444" fill-opacity="0.1" stroke="#EF4444" stroke-opacity="0.3" stroke-width="1"/>
  <text x="56" y="96" fill="#F87171" font-family="system-ui,sans-serif" font-size="10" font-weight="700">P0 CRITICAL</text>
  <text x="260" y="96" text-anchor="end" fill="#8B949E" font-family="system-ui,sans-serif" font-size="9">Auth, payments</text>

  <!-- P1 -->
  <rect x="44" y="110" width="222" height="26" rx="5" fill="#F59E0B" fill-opacity="0.08" stroke="#F59E0B" stroke-opacity="0.25" stroke-width="1"/>
  <text x="56" y="128" fill="#FBBF24" font-family="system-ui,sans-serif" font-size="10" font-weight="700">P1 HIGH</text>
  <text x="260" y="128" text-anchor="end" fill="#8B949E" font-family="system-ui,sans-serif" font-size="9">Emails, webhooks</text>

  <!-- P2 -->
  <rect x="44" y="142" width="222" height="26" rx="5" fill="#3B82F6" fill-opacity="0.08" stroke="#3B82F6" stroke-opacity="0.2" stroke-width="1"/>
  <text x="56" y="160" fill="#60A5FA" font-family="system-ui,sans-serif" font-size="10" font-weight="700">P2 NORMAL</text>
  <text x="260" y="160" text-anchor="end" fill="#8B949E" font-family="system-ui,sans-serif" font-size="9">Analytics, PDFs</text>

  <!-- P3 -->
  <rect x="44" y="174" width="222" height="26" rx="5" fill="#64748B" fill-opacity="0.08" stroke="#64748B" stroke-opacity="0.2" stroke-width="1"/>
  <text x="56" y="192" fill="#94A3B8" font-family="system-ui,sans-serif" font-size="10" font-weight="700">P3 LOW</text>
  <text x="260" y="192" text-anchor="end" fill="#8B949E" font-family="system-ui,sans-serif" font-size="9">Cleanup, reports</text>

  <!-- Retry Policy -->
  <rect x="300" y="46" width="190" height="170" rx="10" fill="#161B22" stroke="#14B8A6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="395" y="66" text-anchor="middle" fill="#5EEAD4" font-family="system-ui,sans-serif" font-size="10" font-weight="700" letter-spacing="1">RETRY POLICY</text>

  <text x="316" y="90" fill="#E6EDF3" font-family="system-ui,sans-serif" font-size="10">Exponential backoff</text>
  <text x="316" y="108" fill="#8B949E" font-family="system-ui,sans-serif" font-size="9">1s → 4s → 16s → 64s</text>

  <text x="316" y="132" fill="#E6EDF3" font-family="system-ui,sans-serif" font-size="10">Max 5 retries</text>

  <text x="316" y="156" fill="#E6EDF3" font-family="system-ui,sans-serif" font-size="10">Dead letter queue</text>
  <text x="316" y="174" fill="#8B949E" font-family="system-ui,sans-serif" font-size="9">For permanently failed jobs</text>

  <text x="316" y="198" fill="#E6EDF3" font-family="system-ui,sans-serif" font-size="10">DLQ threshold alerts</text>

  <!-- BullMQ label -->
  <text x="260" y="245" text-anchor="middle" fill="#FBBF24" font-family="system-ui,sans-serif" font-size="11" font-weight="700">BullMQ</text>
  <text x="260" y="262" text-anchor="middle" fill="#64748B" font-family="system-ui,sans-serif" font-size="9">Redis-based · Battle-tested · Rich features</text>
</svg>