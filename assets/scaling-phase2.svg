<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" width="640">
  <defs>
    <marker id="arr" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0,0 L10,3 L0,6z" fill="#14B8A6"/>
    </marker>
  </defs>
  <rect width="640" height="280" rx="16" fill="#0D1117"/>
  <text x="320" y="30" text-anchor="middle" fill="#5EEAD4" font-family="system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="2">PHASE 2 · 1K-10K USERS</text>

  <!-- Client -->
  <rect x="20" y="60" width="120" height="70" rx="10" fill="#161B22" stroke="#E6EDF3" stroke-opacity="0.2" stroke-width="1.5"/>
  <text x="80" y="90" text-anchor="middle" fill="#E6EDF3" font-family="system-ui,sans-serif" font-size="12" font-weight="700">Client</text>
  <text x="80" y="106" text-anchor="middle" fill="#8B949E" font-family="system-ui,sans-serif" font-size="9">Browser</text>
  <text x="80" y="118" text-anchor="middle" fill="#8B949E" font-family="system-ui,sans-serif" font-size="9">+ WebSocket</text>

  <!-- Arrows Client ↔ Next.js -->
  <line x1="140" y1="85" x2="196" y2="85" stroke="#14B8A6" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="196" y1="100" x2="140" y2="100" stroke="#14B8A6" stroke-width="1.5" stroke-opacity="0.4" marker-end="url(#arr)"/>

  <!-- Next.js -->
  <rect x="200" y="50" width="170" height="100" rx="10" fill="#161B22" stroke="#3B82F6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="285" y="78" text-anchor="middle" fill="#E6EDF3" font-family="system-ui,sans-serif" font-size="13" font-weight="700">Next.js</text>
  <text x="285" y="95" text-anchor="middle" fill="#60A5FA" font-family="system-ui,sans-serif" font-size="9">Vercel · Service Layer</text>
  <text x="285" y="112" text-anchor="middle" fill="#8B949E" font-family="system-ui,sans-serif" font-size="9">Server Components</text>
  <text x="285" y="125" text-anchor="middle" fill="#8B949E" font-family="system-ui,sans-serif" font-size="9">+ API Routes</text>

  <!-- Arrow → PostgreSQL -->
  <line x1="370" y1="78" x2="436" y2="78" stroke="#14B8A6" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Arrow → Redis -->
  <line x1="370" y1="120" x2="436" y2="120" stroke="#14B8A6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PostgreSQL -->
  <rect x="440" y="53" width="170" height="46" rx="8" fill="#161B22" stroke="#8B5CF6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="525" y="74" text-anchor="middle" fill="#E6EDF3" font-family="system-ui,sans-serif" font-size="12" font-weight="600">PostgreSQL</text>
  <text x="525" y="90" text-anchor="middle" fill="#A78BFA" font-family="system-ui,sans-serif" font-size="9">Neon / Supabase</text>

  <!-- Redis -->
  <rect x="440" y="106" width="170" height="80" rx="8" fill="#161B22" stroke="#EF4444" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="525" y="127" text-anchor="middle" fill="#E6EDF3" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Redis</text>
  <text x="525" y="143" text-anchor="middle" fill="#F87171" font-family="system-ui,sans-serif" font-size="9">Upstash · Serverless</text>
  <text x="525" y="160" text-anchor="middle" fill="#8B949E" font-family="system-ui,sans-serif" font-size="8">Session cache</text>
  <text x="525" y="172" text-anchor="middle" fill="#8B949E" font-family="system-ui,sans-serif" font-size="8">Query cache · Rate limiting</text>

  <!-- Arrow PostgreSQL → Redis (cache aside) -->
  <path d="M525,99 L525,106" fill="none" stroke="#64748B" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- WebSocket label -->
  <rect x="20" y="155" width="120" height="40" rx="8" fill="#161B22" stroke="#F59E0B" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="175" text-anchor="middle" fill="#FBBF24" font-family="system-ui,sans-serif" font-size="10" font-weight="600">Pusher</text>
  <text x="80" y="188" text-anchor="middle" fill="#8B949E" font-family="system-ui,sans-serif" font-size="8">Real-time events</text>
  <line x1="80" y1="130" x2="80" y2="155" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="3,2"/>

  <!-- Cost label -->
  <text x="320" y="250" text-anchor="middle" fill="#64748B" font-family="system-ui,sans-serif" font-size="10">~$150/mo · + Upstash Redis + Pusher</text>
</svg>