<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" fill="none">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0F0D"/>
      <stop offset="50%" stop-color="#0D1512"/>
      <stop offset="100%" stop-color="#0A0F0D"/>
    </linearGradient>

    <!-- Teal glow gradient -->
    <radialGradient id="glow1" cx="640" cy="160" r="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="320" cy="80" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D9488" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0D9488" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow3" cx="960" cy="240" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>

    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="410" y1="90" x2="870" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#5EEAD4"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>

    <!-- Pulse line gradient -->
    <linearGradient id="pulseGrad" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0"/>
      <stop offset="20%" stop-color="#14B8A6" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#2DD4BF" stop-opacity="0.4"/>
      <stop offset="80%" stop-color="#14B8A6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#14B8A6" stroke-opacity="0.04" stroke-width="0.5"/>
    </pattern>

    <!-- Noise filter for texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>

    <!-- Badge gradient -->
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.05"/>
    </linearGradient>

    <!-- ECG icon glow -->
    <filter id="ecgGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#14B8A6" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dot pattern -->
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.5" fill="#14B8A6" opacity="0.08"/>
    </pattern>

    <!-- Circuit path decorations -->
    <linearGradient id="circuitGrad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#14B8A6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect width="1280" height="320" fill="url(#dots)"/>

  <!-- Ambient glows -->
  <rect width="1280" height="320" fill="url(#glow1)"/>
  <rect width="1280" height="320" fill="url(#glow2)"/>
  <rect width="1280" height="320" fill="url(#glow3)"/>

  <!-- Subtle horizontal pulse line -->
  <line x1="0" y1="160" x2="1280" y2="160" stroke="url(#pulseGrad)" stroke-width="0.5"/>

  <!-- Circuit decorations - left -->
  <path d="M 0 120 L 80 120 L 100 100 L 160 100" stroke="#14B8A6" stroke-opacity="0.08" stroke-width="0.8" fill="none"/>
  <circle cx="160" cy="100" r="2" fill="#14B8A6" opacity="0.15"/>
  <path d="M 0 200 L 60 200 L 80 220 L 120 220" stroke="#14B8A6" stroke-opacity="0.06" stroke-width="0.8" fill="none"/>
  <circle cx="120" cy="220" r="2" fill="#14B8A6" opacity="0.12"/>

  <!-- Circuit decorations - right -->
  <path d="M 1280 140 L 1200 140 L 1180 120 L 1120 120" stroke="#14B8A6" stroke-opacity="0.08" stroke-width="0.8" fill="none"/>
  <circle cx="1120" cy="120" r="2" fill="#14B8A6" opacity="0.15"/>
  <path d="M 1280 220 L 1220 220 L 1200 200 L 1160 200" stroke="#14B8A6" stroke-opacity="0.06" stroke-width="0.8" fill="none"/>
  <circle cx="1160" cy="200" r="2" fill="#14B8A6" opacity="0.12"/>

  <!-- ECG Icon -->
  <g transform="translate(618, 28)" filter="url(#ecgGlow)">
    <rect x="0" y="0" width="44" height="44" rx="12" fill="#14B8A6" opacity="0.1" stroke="#14B8A6" stroke-opacity="0.3" stroke-width="1"/>
    <path d="M 12 22 L 17 22 L 19 15 L 22 29 L 25 18 L 27 22 L 32 22" stroke="#14B8A6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Title: "Pulse" in white, "Ecosystem" in teal gradient -->
  <text x="640" y="118" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="800" font-size="56" letter-spacing="-1">
    <tspan fill="#FFFFFF">Pulse </tspan><tspan fill="#5EEAD4">Ecosystem</tspan>
  </text>

  <!-- Subtitle -->
  <text x="640" y="148" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="400" font-size="13" letter-spacing="4" fill="#94A3B8" text-transform="uppercase">
    ONE DESIGN SYSTEM. INFINITE SAAS.
  </text>

  <!-- App pills row -->
  <g transform="translate(640, 175)">
    <!-- Pulse Core - highlighted -->
    <g transform="translate(-390, 0)">
      <rect x="0" y="0" width="130" height="32" rx="16" fill="#14B8A6" fill-opacity="0.12" stroke="#14B8A6" stroke-opacity="0.4" stroke-width="1"/>
      <circle cx="16" cy="16" r="4" fill="#14B8A6"/>
      <text x="28" y="20" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" font-size="12" fill="#5EEAD4">Pulse Core</text>
    </g>

    <!-- Connector line -->
    <line x1="-255" y1="16" x2="-230" y2="16" stroke="#14B8A6" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4 3"/>

    <!-- Finance -->
    <g transform="translate(-225, 0)">
      <rect x="0" y="0" width="105" height="32" rx="16" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.1" stroke-width="0.8"/>
      <circle cx="14" cy="16" r="3" fill="#14B8A6"/>
      <text x="24" y="20" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="11.5" fill="#CBD5E1">Finance</text>
      <rect x="68" y="9" width="28" height="14" rx="7" fill="#14B8A6" fill-opacity="0.15"/>
      <text x="82" y="19.5" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" font-size="8" fill="#2DD4BF">Live</text>
    </g>

    <!-- Connector -->
    <line x1="-115" y1="16" x2="-90" y2="16" stroke="white" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="4 3"/>

    <!-- Chat -->
    <g transform="translate(-85, 0)">
      <rect x="0" y="0" width="93" height="32" rx="16" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.1" stroke-width="0.8"/>
      <circle cx="14" cy="16" r="3" fill="#14B8A6"/>
      <text x="24" y="20" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="11.5" fill="#CBD5E1">Chat</text>
      <rect x="56" y="9" width="28" height="14" rx="7" fill="#14B8A6" fill-opacity="0.15"/>
      <text x="70" y="19.5" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" font-size="8" fill="#2DD4BF">Live</text>
    </g>

    <!-- Connector -->
    <line x1="13" y1="16" x2="38" y2="16" stroke="white" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="4 3"/>

    <!-- Vexiat -->
    <g transform="translate(43, 0)">
      <rect x="0" y="0" width="118" height="32" rx="16" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.1" stroke-width="0.8"/>
      <circle cx="14" cy="16" r="3" fill="#F59E0B"/>
      <text x="24" y="20" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="11.5" fill="#CBD5E1">Vexiat</text>
      <rect x="64" y="9" width="44" height="14" rx="7" fill="#F59E0B" fill-opacity="0.12"/>
      <text x="86" y="19.5" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" font-size="8" fill="#FBBF24">In Dev</text>
    </g>

    <!-- Connector -->
    <line x1="166" y1="16" x2="191" y2="16" stroke="white" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="4 3"/>

    <!-- AI -->
    <g transform="translate(196, 0)">
      <rect x="0" y="0" width="86" height="32" rx="16" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.07" stroke-width="0.8"/>
      <circle cx="14" cy="16" r="3" fill="#64748B"/>
      <text x="24" y="20" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="11.5" fill="#64748B">AI</text>
      <rect x="40" y="9" width="38" height="14" rx="7" fill="white" fill-opacity="0.05"/>
      <text x="59" y="19.5" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="8" fill="#64748B">Planned</text>
    </g>

    <!-- Connector -->
    <line x1="287" y1="16" x2="312" y2="16" stroke="white" stroke-opacity="0.05" stroke-width="1" stroke-dasharray="4 3"/>

    <!-- CRM -->
    <g transform="translate(317, 0)">
      <rect x="0" y="0" width="92" height="32" rx="16" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.07" stroke-width="0.8"/>
      <circle cx="14" cy="16" r="3" fill="#64748B"/>
      <text x="24" y="20" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="11.5" fill="#64748B">CRM</text>
      <rect x="48" y="9" width="38" height="14" rx="7" fill="white" fill-opacity="0.05"/>
      <text x="67" y="19.5" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="8" fill="#64748B">Planned</text>
    </g>
  </g>

  <!-- Divider line -->
  <line x1="340" y1="228" x2="940" y2="228" stroke="white" stroke-opacity="0.06" stroke-width="0.5"/>

  <!-- Stats row -->
  <g transform="translate(640, 255)">
    <!-- 100+ Components -->
    <g transform="translate(-400, 0)" text-anchor="start">
      <text y="0" font-family="'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="28" fill="#FFFFFF">100+</text>
      <text y="16" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="9.5" letter-spacing="2" fill="#64748B">COMPONENTS</text>
    </g>

    <!-- 56 Pages -->
    <g transform="translate(-230, 0)" text-anchor="start">
      <text y="0" font-family="'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="28" fill="#FFFFFF">56</text>
      <text y="16" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="9.5" letter-spacing="2" fill="#64748B">PAGES</text>
    </g>

    <!-- 25 Dashboards -->
    <g transform="translate(-100, 0)" text-anchor="start">
      <text y="0" font-family="'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="28" fill="#FFFFFF">25</text>
      <text y="16" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="9.5" letter-spacing="2" fill="#64748B">DASHBOARDS</text>
    </g>

    <!-- 3 Languages -->
    <g transform="translate(30, 0)" text-anchor="start">
      <text y="0" font-family="'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="28" fill="#FFFFFF">3</text>
      <text y="16" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="9.5" letter-spacing="2" fill="#64748B">LANGUAGES</text>
    </g>

    <!-- Next.js 16 + React 19 -->
    <g transform="translate(160, 0)" text-anchor="start">
      <text y="0" font-family="'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="28" fill="#FFFFFF">16</text>
      <text y="0" font-family="'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="13" fill="#FFFFFF" dx="4"> </text>
      <text y="16" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="9.5" letter-spacing="1" fill="#64748B">NEXT.JS</text>
      <text y="0" font-family="'Segoe UI', system-ui, sans-serif" font-weight="400" font-size="12" fill="#475569" dx="34">+</text>
      <text y="16" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="9.5" letter-spacing="1" fill="#64748B" dx="34"> </text>
    </g>
    <g transform="translate(220, 0)" text-anchor="start">
      <text y="0" font-family="'Segoe UI', system-ui, sans-serif" font-weight="400" font-size="13" fill="#94A3B8">React 19</text>
    </g>

    <!-- Tailwind 4 + TS 5 -->
    <g transform="translate(310, 0)" text-anchor="start">
      <text y="0" font-family="'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="28" fill="#FFFFFF">Tailwind 4</text>
      <text y="0" font-family="'Segoe UI', system-ui, sans-serif" font-weight="400" font-size="12" fill="#475569" dx="148">+</text>
      <text y="16" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="9.5" letter-spacing="1" fill="#64748B">CSS</text>
    </g>
    <g transform="translate(470, 0)" text-anchor="start">
      <text y="0" font-family="'Segoe UI', system-ui, sans-serif" font-weight="400" font-size="13" fill="#94A3B8">TypeScript 5</text>
    </g>
  </g>

  <!-- Top/bottom edge lines -->
  <line x1="0" y1="0" x2="1280" y2="0" stroke="#14B8A6" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="0" y1="319" x2="1280" y2="319" stroke="#14B8A6" stroke-opacity="0.15" stroke-width="1"/>
</svg>